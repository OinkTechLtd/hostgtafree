<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Обратная связь | HostGTAFree</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0b0e1a 0%, #1a1f2f 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #fff;
            padding: 20px;
        }
        .container {
            max-width: 650px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(8px);
            border-radius: 32px;
            padding: 40px 35px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.7);
            border: 1px solid rgba(255, 80, 80, 0.2);
        }
        .icon-big { font-size: 3.5rem; text-align: center; margin-bottom: 5px; }
        h2 {
            text-align: center;
            font-size: 2rem;
            color: #ff6b6b;
            margin-bottom: 5px;
        }
        .sub {
            text-align: center;
            color: #aab;
            margin-bottom: 25px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            font-weight: 600;
            display: block;
            margin-bottom: 6px;
            color: #ddd;
        }
        select, textarea, input[type="text"], input[type="email"] {
            width: 100%;
            padding: 12px 16px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.1);
            background: rgba(0,0,0,0.3);
            color: #fff;
            font-size: 1rem;
            outline: none;
            transition: 0.3s;
        }
        select:focus, textarea:focus, input:focus {
            border-color: #f7d94e;
            box-shadow: 0 0 0 3px rgba(247, 217, 78, 0.2);
        }
        textarea { resize: vertical; min-height: 90px; }
        .star-rating {
            display: flex;
            flex-direction: row-reverse;
            justify-content: flex-end;
            gap: 8px;
        }
        .star-rating input {
            display: none;
        }
        .star-rating label {
            font-size: 2.2rem;
            color: #555;
            cursor: pointer;
            transition: 0.2s;
        }
        .star-rating label:hover,
        .star-rating label:hover ~ label,
        .star-rating input:checked ~ label {
            color: #f7d94e;
            text-shadow: 0 0 15px #f0a500;
        }
        .checkbox-group {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-top: 5px;
        }
        .checkbox-group label {
            display: flex;
            align-items: center;
            gap: 6px;
            font-weight: 400;
            color: #ccc;
            cursor: pointer;
        }
        .checkbox-group input[type="checkbox"] {
            width: 18px;
            height: 18px;
            accent-color: #f7d94e;
            cursor: pointer;
        }
        .btn-group {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 10px;
        }
        .btn {
            padding: 14px 35px;
            border: none;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            text-decoration: none;
            display: inline-block;
        }
        .btn-danger {
            background: linear-gradient(135deg, #ff6b6b, #e03131);
            color: #fff;
            box-shadow: 0 8px 20px rgba(255, 80, 80, 0.3);
        }
        .btn-danger:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 28px rgba(255, 80, 80, 0.5);
        }
        .btn-secondary {
            background: rgba(255,255,255,0.1);
            color: #fff;
            border: 1px solid rgba(255,255,255,0.2);
        }
        .btn-secondary:hover {
            background: rgba(255,255,255,0.2);
            transform: translateY(-3px);
        }
        .success-msg {
            display: none;
            background: rgba(46, 213, 115, 0.15);
            border: 1px solid #2ed573;
            border-radius: 16px;
            padding: 20px;
            margin-top: 20px;
            color: #2ed573;
            text-align: center;
        }
        .success-msg.show { display: block; }
        .info-note {
            margin-top: 20px;
            font-size: 0.9rem;
            color: #889;
            text-align: center;
        }
        @media (max-width: 600px) {
            .container { padding: 25px 20px; }
            h2 { font-size: 1.6rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon-big">🗑️</div>
        <h2>Подтверждение удаления</h2>
        <div class="sub">Нам жаль, что вы уходите. Помогите нам стать лучше!</div>

        <form id="feedbackForm" action="send_feedback.php" method="POST">
            <!-- Рейтинг звёздами -->
            <div class="form-group">
                <label>Оцените ваш опыт (1 – ужасно, 5 – отлично)</label>
                <div class="star-rating">
                    <input type="radio" name="rating" id="star5" value="5" required>
                    <label for="star5" title="5 звёзд">★</label>
                    <input type="radio" name="rating" id="star4" value="4">
                    <label for="star4" title="4 звезды">★</label>
                    <input type="radio" name="rating" id="star3" value="3">
                    <label for="star3" title="3 звезды">★</label>
                    <input type="radio" name="rating" id="star2" value="2">
                    <label for="star2" title="2 звезды">★</label>
                    <input type="radio" name="rating" id="star1" value="1">
                    <label for="star1" title="1 звезда">★</label>
                </div>
            </div>

            <!-- Причины удаления (множественный выбор) -->
            <div class="form-group">
                <label>Что именно не устроило? (выберите несколько)</label>
                <div class="checkbox-group">
                    <label><input type="checkbox" name="reasons[]" value="Сложно в настройке"> Сложно в настройке</label>
                    <label><input type="checkbox" name="reasons[]" value="Высокая цена"> Высокая цена</label>
                    <label><input type="checkbox" name="reasons[]" value="Не хватает функций"> Не хватает функций</label>
                    <label><input type="checkbox" name="reasons[]" value="Низкая производительность"> Низкая производительность</label>
                    <label><input type="checkbox" name="reasons[]" value="Плохая поддержка"> Плохая поддержка</label>
                    <label><input type="checkbox" name="reasons[]" value="Нашёл альтернативу"> Нашёл альтернативу</label>
                    <label><input type="checkbox" name="reasons[]" value="Не подходит интерфейс"> Не подходит интерфейс</label>
                    <label><input type="checkbox" name="reasons[]" value="Другое"> Другое</label>
                </div>
            </div>

            <!-- Комментарий -->
            <div class="form-group">
                <label for="comment">Ваш комментарий (подробнее о проблеме)</label>
                <textarea id="comment" name="comment" placeholder="Расскажите, что нам стоит улучшить..."></textarea>
            </div>

            <!-- Email (опционально) -->
            <div class="form-group">
                <label for="email">Ваш email (для ответа, необязательно)</label>
                <input type="email" id="email" name="email" placeholder="your@email.com">
            </div>

            <div class="btn-group">
                <button type="submit" class="btn btn-danger">Отправить и удалить</button>
                <a href="welcome.html" class="btn btn-secondary">Отмена</a>
            </div>
        </form>

        <div class="success-msg" id="successMsg">
            ✅ Спасибо за ваш отзыв! Мы учтём ваши пожелания.<br>
            <small>Ваш аккаунт / сервер будет удалён в течение 24 часов.</small>
        </div>

        <div class="info-note">
            ⚠️ Это действие необратимо. Все данные будут удалены.
        </div>
    </div>

    <!-- Если хотите отправлять без перезагрузки – используйте JS, но для простоты оставим обычную отправку -->
</body>
</html>
