<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Добро пожаловать | HostGTAFree</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0b0e1a 0%, #1a1f2f 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #fff;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(8px);
            border-radius: 32px;
            padding: 50px 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.7);
            border: 1px solid rgba(255, 215, 0, 0.3);
            text-align: center;
        }
        h1 {
            font-size: 3rem;
            font-weight: 800;
            background: linear-gradient(90deg, #f7d94e, #f0a500);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }
        .subtitle {
            font-size: 1.2rem;
            color: #aab;
            margin-bottom: 30px;
        }
        .logo { font-size: 4rem; margin-bottom: 10px; }
        .description {
            font-size: 1.1rem;
            line-height: 1.6;
            color: #ccc;
            margin-bottom: 30px;
        }
        .btn-group {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .btn {
            padding: 14px 40px;
            border: none;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            text-decoration: none;
            display: inline-block;
        }
        .btn-primary {
            background: linear-gradient(135deg, #f7d94e, #f0a500);
            color: #0b0e1a;
            box-shadow: 0 8px 20px rgba(240, 165, 0, 0.3);
        }
        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 28px rgba(240, 165, 0, 0.5);
        }
        .btn-secondary {
            background: rgba(255,255,255,0.1);
            color: #fff;
            border: 1px solid rgba(255,255,255,0.2);
        }
        .btn-secondary:hover {
            background: rgba(255,255,255,0.2);
            transform: translateY(-3px);
        }
        .footer {
            margin-top: 40px;
            font-size: 0.85rem;
            color: #667;
        }
        @media (max-width: 600px) {
            .container { padding: 30px 20px; }
            h1 { font-size: 2.2rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">🚗</div>
        <h1>Добро пожаловать</h1>
        <div class="subtitle">на <strong>HostGTAFree</strong> – бесплатное продление на хостинге для серверов GTA</div>
        <div class="description">
            Продлевай и управляй своим игровым миром вместе с нами.<br>
            Быстрые серверы, удобная панель и надёжная защита.
        </div>
        <div class="btn-group">
            <a href="#" class="btn btn-primary">Войти в панель</a>
            <a href="feedback.html" class="btn btn-secondary">Удалить сервер / аккаунт</a>
        </div>
        <div class="footer">
            <span>🔒 Безопасность • ⚡ Высокая производительность • 🎮 GTA V / SAMP</span>
        </div>
    </div>
</body>
</html>
